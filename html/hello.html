<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" type="text/css" href="stylesheets/pillow.css" />
<script type="text/javascript" src="javascripts/local_debug.js"></script>
<script type="text/javascript" src="javascripts/constants.js"></script>
<script type="text/javascript" src="javascripts/pillow.js"></script>
<script type="text/javascript" src="javascripts/window_title.js"></script>
<style>
body { font-family: sans-serif; padding: 30px; background: #fff; color: #000; }
h1 { font-size: 36px; border: 4px solid #000; padding: 20px; }
button { font-size: 28px; padding: 18px 36px; border: 2px solid #000; background: #fff; margin-top: 20px; }
</style>
</head>
<body onload="init()">
<h1>HELLO KYLE — render works!</h1>
<p>Tap Close or wait 15s.</p>
<button onclick="dismiss()">Close</button>
<script>
function dismiss() {
  try { nativeBridge.dismissMe(); } catch (e) {}
}
function init() {
  try {
    nativeBridge.setWindowSize(Pillow.pointsToPixels(400), Pillow.pointsToPixels(200));
    var wt = new WindowTitle(WINMGR.LAYER.DIALOG, WINMGR.ROLE.DIALOG);
    wt.addParam(WINMGR.KEY.WIN_IS_MODAL, WINMGR.MODALITY.MODAL);
    nativeBridge.showMe();
  } catch (e) {}
  setTimeout(dismiss, 15000);
}
</script>
</body>
</html>
