<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type="text/javascript" src="javascripts/local_debug.js"></script>
<script type="text/javascript" src="javascripts/constants.js"></script>
<script type="text/javascript" src="javascripts/pillow.js"></script>
<script type="text/javascript" src="javascripts/window_title.js"></script>
<style>
body { font-family: sans-serif; padding: 40px; background: #fff; color: #000; }
h1 { font-size: 44px; border: 4px solid #000; padding: 20px; }
p { font-size: 22px; }
button { font-size: 28px; padding: 18px 36px; border: 2px solid #000; background: #fff; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body onload="hcInit()">
<h1>HELLO KYLE — render works!</h1>
<p>Tap Close, or wait 15s for auto-dismiss.</p>
<button onclick="hcClose()">Close</button>
<script>
function hcClose() {
  try { if (typeof nativeBridge !== "undefined" && nativeBridge.dismissMe) nativeBridge.dismissMe(); } catch (e) {}
  try { window.close(); } catch (e) {}
}
function hcInit() { setTimeout(hcClose, 15000); }
</script>
</body>
</html>
