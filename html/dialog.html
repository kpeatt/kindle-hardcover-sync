<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" type="text/css" href="stylesheets/pillow.css" />
<script type="text/javascript" src="javascripts/local_debug.js"></script>
<script type="text/javascript" src="javascripts/constants.js"></script>
<script type="text/javascript" src="javascripts/pillow.js"></script>
<script type="text/javascript" src="javascripts/window_title.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #fff; color: #000; padding: 28px; }
h1 { font-size: 30px; margin-bottom: 14px; }
.message { font-size: 22px; line-height: 1.4; margin-bottom: 22px; white-space: pre-wrap; }
.buttons { display: flex; flex-wrap: wrap; gap: 10px; }
button { font-size: 24px; padding: 14px 22px; border: 2px solid #000; background: #fff; min-width: 90px; }
button:active { background: #000; color: #fff; }
</style>
</head>
<body onload="init()">
<h1 id="title">Hardcover Sync</h1>
<div class="message" id="message">Loading...</div>
<div class="buttons" id="buttons"></div>
<script>
function shout(msg) {
  // Fire every log method we can think of with the same payload
  try { nativeBridge.logDbg(msg); } catch (e) {}
  try { nativeBridge.logWarn(msg); } catch (e) {}
  try { nativeBridge.logError(msg); } catch (e) {}
  try { nativeBridge.log(msg); } catch (e) {}
  try { nativeBridge.debug(msg); } catch (e) {}
  try { nativeBridge.info(msg); } catch (e) {}
  try { nativeBridge.warn(msg); } catch (e) {}
  try { nativeBridge.error(msg); } catch (e) {}
  try { nativeBridge.logInfo(msg); } catch (e) {}
  try { console.log(msg); } catch (e) {}
  try { console.error(msg); } catch (e) {}
  // As a side-channel: change window title so winmgr might log it
  try { nativeBridge.setWindowTitle(msg); } catch (e) {}
}

function reply(id) {
  shout("HCSYNC_REPLY_" + id + "_END");
  setTimeout(function () { try { nativeBridge.dismissMe(); } catch (e) {} }, 1200);
}

function render(paramsString) {
  var p; try { p = JSON.parse(paramsString); } catch (e) { return; }
  if (p.title) document.getElementById("title").textContent = p.title;
  if (p.message !== undefined) document.getElementById("message").textContent = p.message;
  var btnDiv = document.getElementById("buttons");
  btnDiv.innerHTML = "";
  var btns = p.buttons || [];
  for (var i = 0; i < btns.length; i++) {
    (function (b) {
      var el = document.createElement("button");
      el.textContent = b.label;
      el.onclick = function () { reply(b.id); };
      btnDiv.appendChild(el);
    })(btns[i]);
  }
}

function init() {
  try {
    // Dump all nativeBridge methods so we know what's actually available
    var methods = [];
    for (var m in nativeBridge) methods.push(m);
    shout("HCSYNC_METHODS_" + methods.join(",") + "_END");

    nativeBridge.registerClientParamsCallback(render);
    nativeBridge.setWindowSize(Pillow.pointsToPixels(450), Pillow.pointsToPixels(300));
    var wt = new WindowTitle(WINMGR.LAYER.DIALOG, WINMGR.ROLE.DIALOG);
    wt.addParam(WINMGR.KEY.WIN_IS_MODAL, WINMGR.MODALITY.MODAL);
    nativeBridge.showMe();
  } catch (e) {
    try { shout("HCSYNC_INIT_ERROR_" + e.message); } catch (ee) {}
  }
}
</script>
</body>
</html>
